<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Error — Credit Risk Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="page" style="text-align:center;padding-top:4rem;">
    <div class="empty-icon" style="font-size:48px;color:#C8842A;">⚠</div>
    <h2 style="margin:1rem 0 0.5rem;">Something went wrong</h2>
    <p class="muted" th:text="${error}">An unexpected error occurred.</p>
    <a href="/" class="btn-primary" style="display:inline-block;margin-top:1.5rem;">← Back to Dashboard</a>
</div>
</body>
</html>
